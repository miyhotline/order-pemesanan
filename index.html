<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Order PAPAPIS - Batch 1</title>
    <!-- Menggunakan Tailwind CSS untuk tampilan instan yang modern dan rapi -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-md w-full max-w-md border border-gray-100">
        <!-- Header Brand -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-orange-600 tracking-wide">🐟 PAPAPIS</h1>
            <p class="text-xs text-gray-500 mt-1">Sajian Ikan Tanpa Ribet, Resep Sayang dari Papa</p>
            <div class="mt-3 inline-block bg-orange-50 border border-orange-200 text-orange-700 text-xs px-3 py-1 rounded-full font-medium">
                PROMO BATCH 1: Rp15.000 / 2 Pcs
            </div>
        </div>

        <!-- Form Pemesanan -->
        <form id="orderForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Nama Lengkap</label>
                <input type="text" name="nama" required placeholder="Contoh: Budi Santoso" class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">No. WhatsApp</label>
                <input type="tel" name="whatsapp" required placeholder="Contoh: 08123456789" class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Jumlah Paket (1 Paket isi 2 Pcs)</label>
                <input type="number" id="jumlahPaket" name="jumlahPaket" min="1" value="1" required class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500">
                <p class="text-xs text-gray-400 mt-1">*Mendapatkan 2 rasa langsung: Manis Rempah & Pedas Rempah</p>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Metode Pengiriman</label>
                <select name="metodeKirim" required class="w-full px-4 py-2 border bg-white rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <option value="COD">COD (Bayar di Tempat)</option>
                    <option value="Ambil Sendiri">Ambil Sendiri ke Rumah Papa</option>
                    <option value="Ojek Online">Dikirim via Ojek Online (Ongkir ditanggung pembeli)</option>
                </select>
            </div>

            <!-- Ringkasan Invoice -->
            <div class="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-200 text-sm space-y-1">
                <div class="flex justify-between text-gray-500">
                    <span>Harga per Paket:</span>
                    <span>Rp15.000</span>
                </div>
                <div class="flex justify-between font-bold text-gray-800 text-base pt-1 border-t">
                    <span>Total Bayar:</span>
                    <span id="totalHarga">Rp15.000</span>
                </div>
            </div>

            <!-- Tombol Submit -->
            <button type="submit" id="submitBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition duration-200 shadow-sm">
                Kirim Pesanan Sekarang
            </button>
        </form>

        <!-- Notifikasi Sukses/Gagal -->
        <div id="statusMessage" class="hidden mt-4 text-center text-sm p-3 rounded-xl"></div>
    </div>

    <!-- Logika Javascript untuk Interaksi Form -->
    <script>
        const urlWebApps = "https://script.google.com/macros/s/AKfycbwMfU50yJq73ewxN7CvxkVI7E9Ac93CaAmpt8E16HS3AAhBCYLfnz5Sd0k_5KGVo9rxkw/exec";
        const inputJumlah = document.getElementById('jumlahPaket');
        const textTotal = document.getElementById('totalHarga');
        const form = document.getElementById('orderForm');
        const btnSubmit = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');

        // Otomatis update hitungan total harga di layar pembeli
        inputJumlah.addEventListener('input', function() {
            const qty = parseInt(inputJumlah.value) || 0;
            const total = qty * 15000;
            textTotal.innerText = "Rp" + total.toLocaleString('id-ID');
        });

        // Proses pengiriman data ke Google Sheets saat tombol ditekan
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Memproses Pesanan...";
            btnSubmit.className = "w-full bg-gray-400 text-white font-bold py-3 rounded-xl cursor-not-allowed";

            const formData = new FormData(form);
            const searchParams = new URLSearchParams();

            for (const pair of formData) {
                searchParams.append(pair[0], pair[1]);
            }

            // Mengirim data menggunakan metode Fetch API
            fetch(urlWebApps + "?" + searchParams.toString(), {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === "success") {
                    statusMsg.className = "mt-4 text-center text-sm p-3 rounded-xl bg-green-50 text-green-700 border border-green-200 font-medium";
                    statusMsg.innerText = "🎉 Pesanan Anda berhasil dicatat! Papa akan segera menghubungi Anda via WhatsApp.";
                    statusMsg.classList.remove('hidden');
                    form.reset();
                    textTotal.innerText = "Rp15.000";
                } else {
                    throw new Error(data.error);
                }
            })
            .catch(error => {
                statusMsg.className = "mt-4 text-center text-sm p-3 rounded-xl bg-red-50 text-red-700 border border-red-200 font-medium";
                statusMsg.innerText = "❌ Terjadi kesalahan. Silakan hubungi Papa langsung via WA.";
                statusMsg.classList.remove('hidden');
                console.error(error);
            })
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Kirim Pesanan Sekarang";
                btnSubmit.className = "w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition duration-200 shadow-sm";
            });
        });
    </script>
</body>
</html>
